- name: deepseek-v4-pro-q2-ssd
  description: |
    DeepSeek V4 Pro (IQ2XXS GGUF, ~433 GB, imatrix-tuned) - only loadable via the
    ds4 backend, with SSD streaming so the Pro-class model can be run on a 128 GB
    machine. This is experimental and slow: it needs ~433 GB of free SSD plus
    enough RAM for the resident weights, KV cache, and routed-expert cache, and
