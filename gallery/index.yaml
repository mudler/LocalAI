- name: deepseek-v4-flash-q2-mtp
  description: |
    DeepSeek V4 Flash (IQ2XXS GGUF, ~81 GB) paired with the optional MTP
    speculative-decoding weights (~3.5 GB) for a slight speedup. Only loadable
    via the ds4 backend; requires >=128 GB RAM. MTP helps only with greedy
    decoding (temperature 0), so the override pins temperature to 0. Metal
    (Darwin) or CUDA (Linux). See https://github.com/antirez/ds4 for details.
  urls:
