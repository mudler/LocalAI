- name: deepseek-v4-flash-q4-ssd
  description: |
    DeepSeek V4 Flash (full 4-bit experts GGUF, ~153 GB) - only loadable via the
    ds4 backend, with SSD streaming enabled so it runs on a 128 GB machine even
    though the weights do not fit in RAM: routed MoE experts stream from the GGUF
    on SSD while the non-routed weights stay resident. SSD streaming is Metal
    (Darwin) only; generation speed depends on SSD speed and the expert cache.
    Tune the routed-expert cache with the 'ssd_streaming_cache_experts:NGB'
    option (default: automatic budget). See https://github.com/antirez/ds4.
  urls:
    - https://huggingface.co/antirez/deepseek-v4-gguf
  tags:
    - deepseek
    - ds4
    - gguf
    - llm
    - chat
  overrides:
    backend: ds4
    options:
      - ssd_streaming
    parameters:
      model: ds4flash.gguf
  files:
