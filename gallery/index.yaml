- name: longcat-video-avatar-1.5
  url: github:mudler/LocalAI/gallery/virtual.yaml@master
  urls:
    - https://huggingface.co/meituan-longcat/LongCat-Video-Avatar-1.5
    - https://github.com/meituan-longcat/LongCat-Video
  description: |
    LongCat-Video-Avatar-1.5 served by LocalAI's dedicated CUDA backend. Turns
    speech plus a prompt into an avatar video, optionally conditioning on a
    portrait, and continues across multiple segments for longer audio.

    Avatar generation also loads tokenizer, text encoder, and VAE components
    from LongCat-Video. Plan for very large downloads and substantial NVIDIA
    GPU or unified memory; CPU and macOS execution are unsupported.
  license: mit
  icon: https://raw.githubusercontent.com/meituan-longcat/LongCat-Video/main/assets/longcat-video_logo.svg
  tags:
    - audio-to-video
    - image-to-video
    - avatar-generation
    - talking-head
    - longcat-video
    - cuda
    - gpu
    - dgx-spark
  last_checked: "2026-07-12"
  overrides:
    backend: longcat-video
    known_usecases:
      - video
    known_input_modalities:
      - text
      - image
      - audio
    known_output_modalities:
      - video
    options:
      - attention_backend:sdpa
      - use_distill:true
    # Avatar generation needs two repositories: the avatar checkpoint itself
    # plus the tokenizer, text encoder and VAE from the LongCat-Video base
    # repo. Declaring the base repo as a companion has LocalAI acquire both up
    # front, so a distributed worker is handed staged weights instead of
    # downloading them itself inside the load deadline.
    #
    # allow_patterns keeps this to what the configured options actually load.
    # The avatar repo ships both base_model/ and base_model_int8/ and only one
    # is ever read, so fetching both would roughly double the download. These
    # patterns match use_distill:true with use_int8 left at its default of
    # false; enabling use_int8 on this entry additionally requires adding
    # base_model_int8/** here.
    artifacts:
      - name: model
        target: model
        source:
          type: huggingface
          repo: meituan-longcat/LongCat-Video-Avatar-1.5
          allow_patterns:
            - config.json
            - model_index.json
            - scheduler/**
            - lora/dmd_lora.safetensors
            - whisper-large-v3/config.json
            - whisper-large-v3/model.safetensors
            - whisper-large-v3/preprocessor_config.json
            - base_model/**
      - name: base_model
        target: companion
        source:
          type: huggingface
          repo: meituan-longcat/LongCat-Video
          allow_patterns:
            - config.json
            - model_index.json
            - text_encoder/**
            - tokenizer/**
