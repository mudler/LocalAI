description: |
  Lumina-Image 2.0 is a unified and efficient image generative framework.
  This model uses the Lumina2 architecture and requires the stablediffusion-ggml backend.
  
  ## Usage
  To use this model, place your Lumina-Image GGUF model file in the models directory
  and reference it in your configuration.
  
  ## Requirements
  - Backend: stablediffusion-ggml
  - Model file: Lumina-Image 2.0 in GGUF format (e.g., lumina-image-2.0.Q4_K_M.gguf)
  
  ## Note
  Lumina-Image 2.0 uses the "lumina2" architecture which is not supported by llama-cpp backend.
  Always use the stablediffusion-ggml backend for Lumina-Image models.

